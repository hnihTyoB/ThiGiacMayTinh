# ---------------------------------------------------------------------------- #
# Training config: ID Card Deblurring with SwinIR
# Đồ án Deblur/Unblur ảnh - Cấp độ 3: ID Card
# ---------------------------------------------------------------------------- #
name: DeblurIDCard_SwinIR
model_type: SRModel
scale: 1  # Deblur: không thay đổi kích thước ảnh
num_gpu: 1
manual_seed: 42

# ================================ Datasets ================================= #
datasets:
  train:
    name: IDCardDeblur_train
    type: PairedImageDataset
    dataroot_gt: datasets/idcard/train/sharp
    dataroot_lq: datasets/idcard/train/blur
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: false  # Không rotate ID card vì text sẽ bị lộn

    # Data loader
    num_worker_per_gpu: 2
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~



# ============================== Network (G) ================================ #
network_g:
  type: SwinIR
  upscale: 1
  in_chans: 3
  img_size: 128
  window_size: 8
  img_range: 1.
  depths: [6, 6, 6, 6]
  embed_dim: 96
  num_heads: [6, 6, 6, 6]
  mlp_ratio: 4
  upsampler: ''
  resi_connection: '1conv'

# ================================= Path ==================================== #
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: /content/drive/MyDrive/DeblurModels/DeblurIDCard_SwinIR/training_states/135000.state

# ============================= Training Settings =========================== #
train:
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [100000, 200000, 300000, 400000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  # Losses — L1 chính cho text clarity, không dùng perceptual cho ID card
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

# ============================ Validation Settings ========================== #
val:
  val_freq: !!float 5e5
  save_img: false
  pbar: true

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# =============================== Logging =================================== #
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# ========================= Distributed Training ============================ #
dist_params:
  backend: nccl
  port: 29500
